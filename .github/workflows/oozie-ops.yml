name: Oozie Operations
run-name: "${{ github.event.inputs.environment }} | ${{ github.event.inputs.operation }} | ${{ github.event.inputs.job_id }} | by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to perform'
        required: true
        type: choice
        options:
          - kill
          - suspend
          - resume
          - restart
          - restart_failed_node
      environment:
        description: 'Target environment'
        required: true
        default: 'test-deploy'
        type: choice
        options:
          - test-deploy
          - prod
      job_id:
        description: 'Oozie Job ID (e.g. 0000001-240101000000000-oozie-oozi-W)'
        required: true
        type: string
      node_name:
        description: 'Node name (required only for restart_failed_node)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [[ ! "${{ github.event.inputs.job_id }}" =~ ^[0-9]+-[0-9]+-oozie-oozi-[WCB]$ ]]; then
            echo "ERROR: Invalid Oozie Job ID format"
            echo "Expected format: 0000001-240101000000000-oozie-oozi-W"
            exit 1
          fi
          if [ "${{ github.event.inputs.operation }}" = "restart_failed_node" ] && [ -z "${{ github.event.inputs.node_name }}" ]; then
            echo "ERROR: node_name is required for restart_failed_node operation"
            exit 1
          fi
          echo "Inputs validated successfully"

      - name: Print approval summary
        run: |
          echo "## Approval Request Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${{ github.event.inputs.environment }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Operation | **${{ github.event.inputs.operation }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Job ID | \`${{ github.event.inputs.job_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | ${{ github.event.inputs.node_name || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Requested by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  request-approval:
    needs: validate
    if: contains(fromJSON('["kill", "restart"]'), github.event.inputs.operation)
    environment: cdp-production
    timeout-minutes: 1
    runs-on: ubuntu-latest
    steps:
      - name: Approval granted
        run: echo "Approval received for ${{ github.event.inputs.operation }} on job ${{ github.event.inputs.job_id }} in ${{ github.event.inputs.environment }}"

  execute:
    needs: [validate, request-approval]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.request-approval.result == 'success' || needs.request-approval.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Kill Oozie job
        if: github.event.inputs.operation == 'kill'
        run: |
          echo "Connecting to Oozie server..."
          echo "Sending KILL request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} killed successfully"

      - name: Suspend Oozie job
        if: github.event.inputs.operation == 'suspend'
        run: |
          echo "Connecting to Oozie server..."
          echo "Sending SUSPEND request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} suspended successfully"

      - name: Resume Oozie job
        if: github.event.inputs.operation == 'resume'
        run: |
          echo "Connecting to Oozie server..."
          echo "Sending RESUME request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} resumed successfully"

      - name: Restart Oozie job from beginning
        if: github.event.inputs.operation == 'restart'
        run: |
          echo "Connecting to Oozie server..."
          echo "Step 1: Sending KILL request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} killed"
          echo "Step 2: Sending RERUN request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} restarted from beginning"

      - name: Restart failed node
        if: github.event.inputs.operation == 'restart_failed_node'
        run: |
          echo "Connecting to Oozie server..."
          echo "Sending RERUN request for failed node: ${{ github.event.inputs.node_name }}"
          echo "Job ID: ${{ github.event.inputs.job_id }}"
          echo "Response: Failed node ${{ github.event.inputs.node_name }} restarted successfully"

      - name: Summary
        run: |
          echo "================================"
          echo "Environment : ${{ github.event.inputs.environment }}"
          echo "Operation   : ${{ github.event.inputs.operation }}"
          echo "Job ID      : ${{ github.event.inputs.job_id }}"
          echo "Node        : ${{ github.event.inputs.node_name || 'N/A' }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "================================"

      - name: Update audit/audit_log.csv
        if: always()
        run: |
          MAX_ROWS=6
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          NEW_ENTRY="$TIMESTAMP,${{ github.event.inputs.environment }},${{ github.event.inputs.operation }},${{ github.event.inputs.job_id }},${{ github.event.inputs.node_name || 'N/A' }},${{ github.actor }},$STATUS"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            git fetch origin main
            git checkout origin/main -- audit/audit_log.csv 2>/dev/null || echo "timestamp,environment,operation,job_id,node_name,triggered_by,status" > audit/audit_log.csv

            echo "$NEW_ENTRY" >> audit/audit_log.csv

            TOTAL=$(wc -l < audit/audit_log.csv)
            if [ "$TOTAL" -gt "$((MAX_ROWS + 1))" ]; then
              head -1 audit/audit_log.csv > audit/audit_log.csv.tmp
              tail -n "$MAX_ROWS" audit/audit_log.csv >> audit/audit_log.csv.tmp
              mv audit/audit_log.csv.tmp audit/audit_log.csv
            fi

            git add audit/audit_log.csv
            git commit -m "audit: ${{ github.event.inputs.operation }} on ${{ github.event.inputs.job_id }} by ${{ github.actor }}"
            git push origin main && break
            echo "Push conflict, retrying ($i/3)..."
            git reset HEAD~1
          done
