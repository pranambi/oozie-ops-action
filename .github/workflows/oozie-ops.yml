name: Oozie Operations
run-name: "${{ github.event.inputs.environment }} | ${{ github.event.inputs.operation }} | ${{ github.event.inputs.job_id }} | by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to perform'
        required: true
        type: choice
        options:
          - Kill
          - Suspend
          - Resume
          - Restart
          - Restart_failed_node
      environment:
        description: 'Target environment'
        required: true
        default: 'Test-deploy'
        type: choice
        options:
          - Test-deploy
          - Prod
      job_id:
        description: 'Oozie Job ID (e.g. 0000001-240101000000000-oozie-oozi-W)'
        required: true
        type: string
      node_name:
        description: 'Node name (required only for Restart_failed_node)'
        required: false
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [[ ! "${{ github.event.inputs.job_id }}" =~ ^[0-9]+-[0-9]+-oozie-oozi-[WCB]$ ]]; then
            echo "ERROR: Invalid Oozie Job ID format"
            echo "Expected format: 0000001-240101000000000-oozie-oozi-W"
            exit 1
          fi
          if [ "${{ github.event.inputs.operation }}" = "Restart_failed_node" ] && [ -z "${{ github.event.inputs.node_name }}" ]; then
            echo "ERROR: node_name is required for Restart_failed_node operation"
            exit 1
          fi
          echo "Inputs validated successfully"

      - name: Validate job ownership
        env:
          OOZIE_URL: ${{ secrets.OOZIE_URL }}
          CDP_USERNAME: ${{ secrets.CDP_USERNAME }}
          CDP_PASSWORD: ${{ secrets.CDP_PASSWORD }}
        run: |
          ENV="${{ github.event.inputs.environment }}"
          JOB_ID="${{ github.event.inputs.job_id }}"

          if [ "$ENV" = "Prod" ]; then
            EXPECTED_USER="oozie"
          else
            EXPECTED_USER="aaci_service_user1"
          fi

          echo "Environment: $ENV — expected job owner: $EXPECTED_USER"

          if [ -z "$OOZIE_URL" ]; then
            echo "WARN: OOZIE_URL secret not set — skipping ownership check (demo mode)"
            exit 0
          fi

          JOB_INFO=$(curl -sf -u "$CDP_USERNAME:$CDP_PASSWORD" \
            "$OOZIE_URL/v1/job/$JOB_ID?show=info" 2>/dev/null || echo "")

          if [ -z "$JOB_INFO" ]; then
            echo "WARN: Could not reach Oozie server — skipping ownership check (demo mode)"
            exit 0
          fi

          JOB_USER=$(echo "$JOB_INFO" | jq -r '.user // empty')

          if [ -z "$JOB_USER" ]; then
            echo "ERROR: Could not determine job owner from Oozie API response"
            exit 1
          fi

          if [ "$JOB_USER" != "$EXPECTED_USER" ]; then
            echo "ERROR: Job $JOB_ID is owned by '$JOB_USER'"
            echo "For '$ENV', only jobs owned by '$EXPECTED_USER' are managed through this workflow."
            exit 1
          fi

          echo "Ownership validated: job owner '$JOB_USER' matches expected '$EXPECTED_USER' for $ENV"

      - name: Print approval summary
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "Prod" ]; then
            EXPECTED_USER="oozie"
          else
            EXPECTED_USER="aaci_service_user1"
          fi
          echo "## Approval Request Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **$ENV** |" >> $GITHUB_STEP_SUMMARY
          echo "| Operation | **${{ github.event.inputs.operation }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Job ID | \`${{ github.event.inputs.job_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | ${{ github.event.inputs.node_name || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Expected job owner | \`$EXPECTED_USER\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Requested by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  request-approval:
    needs: validate
    if: contains(fromJSON('["Kill", "Restart"]'), github.event.inputs.operation)
    environment: cdp-production
    runs-on: ubuntu-latest
    steps:
      - name: Approval granted
        run: echo "Approval received for ${{ github.event.inputs.operation }} on job ${{ github.event.inputs.job_id }} in ${{ github.event.inputs.environment }}"

  execute:
    needs: [validate, request-approval]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.request-approval.result == 'success' || needs.request-approval.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.RUNNER_IMAGE }}
      volumes:
        - /opt/cloudera:/opt/cloudera
        - /etc/ssl/certs/ca-bundle.crt:/etc/ssl/certs/ca-bundle.crt
        - /root/.ssh:/root/.ssh
        - /shared/cdp-ops-audit:/shared/cdp-ops-audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check request is not stale
        run: |
          RUN_CREATED=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }} --jq '.created_at')
          AGE=$(( $(date +%s) - $(date -d "$RUN_CREATED" +%s) ))
          MAX_AGE=300
          if [ "$AGE" -gt "$MAX_AGE" ]; then
            echo "ERROR: Request is $((AGE/60)) minutes old. Stale approvals are rejected (max $((MAX_AGE/60)) min)."
            exit 1
          fi
          echo "Request age: $((AGE/60)) min $((AGE%60)) sec — within limit."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Kill Oozie job
        if: github.event.inputs.operation == 'Kill'
        run: |
          echo "Connecting to Oozie server..."
          echo "Sending KILL request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} killed successfully"

      - name: Suspend Oozie job
        if: github.event.inputs.operation == 'Suspend'
        run: |
          echo "Connecting to Oozie server..."
          echo "Sending SUSPEND request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} suspended successfully"

      - name: Resume Oozie job
        if: github.event.inputs.operation == 'Resume'
        run: |
          echo "Connecting to Oozie server..."
          echo "Sending RESUME request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} resumed successfully"

      - name: Restart Oozie job from beginning
        if: github.event.inputs.operation == 'Restart'
        run: |
          echo "Connecting to Oozie server..."
          echo "Step 1: Sending KILL request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} killed"
          echo "Step 2: Sending RERUN request for job: ${{ github.event.inputs.job_id }}"
          echo "Response: Job ${{ github.event.inputs.job_id }} restarted from beginning"

      - name: Restart failed node
        if: github.event.inputs.operation == 'Restart_failed_node'
        run: |
          echo "Connecting to Oozie server..."
          echo "Sending RERUN request for failed node: ${{ github.event.inputs.node_name }}"
          echo "Job ID: ${{ github.event.inputs.job_id }}"
          echo "Response: Failed node ${{ github.event.inputs.node_name }} restarted successfully"

      - name: Summary
        run: |
          echo "================================"
          echo "Environment : ${{ github.event.inputs.environment }}"
          echo "Operation   : ${{ github.event.inputs.operation }}"
          echo "Job ID      : ${{ github.event.inputs.job_id }}"
          echo "Node        : ${{ github.event.inputs.node_name || 'N/A' }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "================================"

      - name: Write audit log
        if: always()
        env:
          AUDIT_LOG_DIR: ${{ vars.AUDIT_LOG_DIR || '/shared/cdp-ops-audit' }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          ENV="${{ github.event.inputs.environment }}"
          OPERATION="${{ github.event.inputs.operation }}"
          JOB_ID="${{ github.event.inputs.job_id }}"
          NODE="${{ github.event.inputs.node_name || 'N/A' }}"
          ACTOR="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          STATUS="${{ job.status }}"

          AUDIT_FILE="$AUDIT_LOG_DIR/oozie-ops-$(date -u +%Y-%m).log"
          ENTRY="$TIMESTAMP | $ENV | $OPERATION | $JOB_ID | $NODE | $ACTOR | $STATUS | run:$RUN_ID"

          if [ ! -d "$AUDIT_LOG_DIR" ]; then
            echo "WARN: '$AUDIT_LOG_DIR' not mounted — skipping audit (configure volume on runner)"
            exit 0
          fi

          echo "$ENTRY" >> "$AUDIT_FILE"
          echo "Audit written → $AUDIT_FILE"
