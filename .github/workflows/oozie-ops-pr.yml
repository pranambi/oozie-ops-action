name: Oozie Operations (PR-based)
run-name: "PR | ${{ github.event.head_commit.message }}"

on:
  push:
    branches: [main]
    paths: ['requests/request.yaml']

jobs:
  execute:
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.RUNNER_IMAGE }}
      volumes:
        - /etc/hosts:/etc/hosts
    env:
      OOZIE_URL: ${{ vars.OOZIE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Parse request file
        id: request
        run: |
          CHANGED="requests/request.yaml"
          if [ ! -f "$CHANGED" ]; then
            echo "ERROR: requests/request.yaml not found"
            exit 1
          fi
          echo "file=$CHANGED" >> $GITHUB_OUTPUT

          OPERATION=$(grep '^operation:' "$CHANGED" | awk '{print $2}' | tr -d '"')
          JOB_ID=$(grep '^job_id:' "$CHANGED" | awk '{print $2}' | tr -d '"')
          CR=$(grep '^cr_number:' "$CHANGED" | cut -d':' -f2- | xargs)
          REASON=$(grep '^reason:' "$CHANGED" | cut -d':' -f2- | xargs)

          echo "operation=$OPERATION" >> $GITHUB_OUTPUT
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "cr_number=${CR:-N/A}" >> $GITHUB_OUTPUT
          echo "reason=${REASON:-Not provided}" >> $GITHUB_OUTPUT

      - name: Validate inputs
        run: |
          ALLOWED="operation job_id cr_number reason"
          UNKNOWN=$(grep -E '^[a-zA-Z_]+:' "${{ steps.request.outputs.file }}" | awk -F: '{print $1}' | tr -d ' ' | while read KEY; do
            echo "$ALLOWED" | grep -qw "$KEY" || echo "$KEY"
          done)
          if [ -n "$UNKNOWN" ]; then
            echo "ERROR: Unknown field(s) in request.yaml: $UNKNOWN"
            echo "Allowed fields: $ALLOWED"
            exit 1
          fi

          if [[ ! "${{ steps.request.outputs.job_id }}" =~ ^[0-9]+-[0-9]+-oozie-oozi-[WCB]$ ]]; then
            echo "ERROR: Invalid Oozie Job ID format"
            echo "Expected format: 0000001-240101000000000-oozie-oozi-W"
            exit 1
          fi
          echo "Inputs validated successfully"

      - name: Print job summary
        run: |
          echo "## Operation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Operation | **${{ steps.request.outputs.operation }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Job ID | \`${{ steps.request.outputs.job_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| CR Number | ${{ steps.request.outputs.cr_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ steps.request.outputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Merged by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Request file | ${{ steps.request.outputs.file }} |" >> $GITHUB_STEP_SUMMARY

      - name: Authenticate with Kerberos
        env:
          KRB5_KEYTAB_B64: ${{ secrets.KRB5_KEYTAB_B64 }}
          KRB5_PRINCIPAL: ${{ vars.KRB5_PRINCIPAL }}
        run: |
          echo "$KRB5_KEYTAB_B64" | base64 -d > /tmp/service.keytab
          chmod 600 /tmp/service.keytab
          kinit -kt /tmp/service.keytab "$KRB5_PRINCIPAL"

      - name: Kill Oozie job
        if: steps.request.outputs.operation == 'Kill'
        run: |
          oozie job -oozie "$OOZIE_URL" -kill "${{ steps.request.outputs.job_id }}"
          echo "Kill executed on job ${{ steps.request.outputs.job_id }}"

      - name: Suspend Oozie job
        if: steps.request.outputs.operation == 'Suspend'
        run: |
          oozie job -oozie "$OOZIE_URL" -suspend "${{ steps.request.outputs.job_id }}"
          echo "Suspend executed on job ${{ steps.request.outputs.job_id }}"

      - name: Resume Oozie job
        if: steps.request.outputs.operation == 'Resume'
        run: |
          oozie job -oozie "$OOZIE_URL" -resume "${{ steps.request.outputs.job_id }}"
          echo "Resume executed on job ${{ steps.request.outputs.job_id }}"

      - name: Restart Oozie job from beginning
        if: steps.request.outputs.operation == 'Restart'
        run: |
          oozie job -oozie "$OOZIE_URL" -kill "${{ steps.request.outputs.job_id }}"
          oozie job -oozie "$OOZIE_URL" -rerun "${{ steps.request.outputs.job_id }}"
          echo "Restart executed on job ${{ steps.request.outputs.job_id }}"

      - name: Restart failed node
        if: steps.request.outputs.operation == 'Restart_failed_node'
        run: |
          oozie job -oozie "$OOZIE_URL" -rerun "${{ steps.request.outputs.job_id }}" -rerun-fail-nodes
          echo "Restart_failed_node executed on job ${{ steps.request.outputs.job_id }}"

      - name: Summary
        run: |
          echo "================================"
          echo "Operation   : ${{ steps.request.outputs.operation }}"
          echo "Job ID      : ${{ steps.request.outputs.job_id }}"
          echo "CR Number   : ${{ steps.request.outputs.cr_number }}"
          echo "Reason      : ${{ steps.request.outputs.reason }}"
          echo "Merged by   : ${{ github.actor }}"
          echo "================================"

      - name: Write audit log
        if: always()
        run: |
          AUDIT_LOG_DIR="/shared/cdp-ops-audit"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          AUDIT_FILE="$AUDIT_LOG_DIR/oozie-ops-pr-$(date -u +%Y-%m).log"
          ENTRY="$TIMESTAMP | ${{ steps.request.outputs.operation }} | ${{ steps.request.outputs.job_id }} | ${{ steps.request.outputs.cr_number }} | ${{ github.actor }} | ${{ steps.request.outputs.reason }} | $STATUS | $RUN_URL"

          if [ ! -d "$AUDIT_LOG_DIR" ]; then
            echo "WARN: '$AUDIT_LOG_DIR' not mounted — skipping audit (configure volume on runner)"
            exit 0
          fi

          if [ ! -f "$AUDIT_FILE" ]; then
            echo "# timestamp | operation | job_id | cr_number | actor | reason | status | run_url" > "$AUDIT_FILE"
          fi

          echo "$ENTRY" >> "$AUDIT_FILE"
          echo "Audit written → $AUDIT_FILE"
