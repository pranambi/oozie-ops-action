name: Script Runner
run-name: "script | ${{ github.event.head_commit.message }} | by ${{ github.actor }}"

on:
  push:
    branches: [main]
    paths: ['scripts/*.sh']

permissions:
  contents: write

jobs:
  run-script:
    # In production: change to 'self-hosted' to run directly on the CDP edge node
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed script
        id: script
        run: |
          CHANGED=$(git diff --name-only HEAD^1 HEAD | grep '^scripts/.*\.sh$' | head -1)
          if [ -z "$CHANGED" ]; then
            echo "No script file found in this push"
            exit 1
          fi
          echo "file=$CHANGED" >> $GITHUB_OUTPUT
          echo "name=$(basename $CHANGED)" >> $GITHUB_OUTPUT

      - name: Print run summary
        run: |
          echo "## Script Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Script | \`${{ steps.script.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run as user | \`${{ steps.runas.outputs.user }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by merge from | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

      - name: Detect run-as user
        id: runas
        run: |
          USER=$(grep '^# RUN_AS:' ${{ steps.script.outputs.file }} | awk '{print $3}' | tr -d '[:space:]')
          if [ -z "$USER" ]; then
            USER=$(whoami)
          fi
          echo "user=$USER" >> $GITHUB_OUTPUT
          echo "Run as user: $USER"

      - name: Make script executable
        run: chmod +x ${{ steps.script.outputs.file }}

      - name: Run script
        run: |
          echo "Running ${{ steps.script.outputs.name }} as user: ${{ steps.runas.outputs.user }}"
          sudo -u ${{ steps.runas.outputs.user }} bash ${{ steps.script.outputs.file }}

      - name: Update audit/audit_log_scripts.csv
        if: always()
        run: |
          MAX_ROWS=3
          AUDIT_FILE="audit/audit_log_scripts.csv"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          NEW_ENTRY="$TIMESTAMP,${{ steps.script.outputs.name }},${{ steps.runas.outputs.user }},${{ github.actor }},${{ github.sha }},$STATUS"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            git fetch origin main
            git checkout origin/main -- "$AUDIT_FILE" 2>/dev/null || echo "timestamp,script,run_by,commit,status" > "$AUDIT_FILE"

            echo "$NEW_ENTRY" >> "$AUDIT_FILE"

            TOTAL=$(wc -l < "$AUDIT_FILE")
            if [ "$TOTAL" -gt "$((MAX_ROWS + 1))" ]; then
              head -1 "$AUDIT_FILE" > "$AUDIT_FILE.tmp"
              tail -n "$MAX_ROWS" "$AUDIT_FILE" >> "$AUDIT_FILE.tmp"
              mv "$AUDIT_FILE.tmp" "$AUDIT_FILE"
            fi

            git add "$AUDIT_FILE"
            git commit -m "audit(script): ${{ steps.script.outputs.name }} by ${{ github.actor }}"
            git push origin main && break
            echo "Push conflict, retrying ($i/3)..."
            git reset HEAD~1
          done
