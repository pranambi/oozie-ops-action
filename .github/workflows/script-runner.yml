name: Script Runner
run-name: "script | ${{ inputs.script }} | as ${{ inputs.run_as }} | by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script filename (from scripts/ folder, e.g. example.sh)'
        required: true
        type: string
      run_as:
        description: 'OS user to run the script as (e.g. hdfs, oozie, cicd_prd)'
        required: true
        default: 'default'
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate script exists
        run: |
          SCRIPT_PATH="scripts/${{ inputs.script }}"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "ERROR: Script not found: $SCRIPT_PATH"
            echo "Available scripts:"
            ls scripts/*.sh 2>/dev/null || echo "  (no .sh files found)"
            exit 1
          fi
          echo "Script found: $SCRIPT_PATH"

      - name: Print run summary
        run: |
          echo "## Script Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Script | \`${{ inputs.script }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run as | \`${{ inputs.run_as }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  request-approval:
    needs: validate
    runs-on: ubuntu-latest
    environment: cdp-production

    steps:
      - name: Awaiting approval
        run: |
          echo "Approval granted for: ${{ inputs.script }} as ${{ inputs.run_as }}"

  execute:
    needs: request-approval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for stale approval
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_AGE: 300
        run: |
          RUN_ID=${{ github.run_id }}
          CREATED_AT=$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID --jq '.created_at')
          CREATED_TS=$(date -d "$CREATED_AT" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$CREATED_AT" +%s)
          NOW=$(date +%s)
          AGE=$((NOW - CREATED_TS))
          echo "Workflow age: ${AGE}s (max allowed: ${MAX_AGE}s)"
          if [ "$AGE" -gt "$MAX_AGE" ]; then
            echo "ERROR: Approval is stale (${AGE}s old). Re-trigger the workflow."
            exit 1
          fi

      - name: Make script executable
        run: chmod +x "scripts/${{ inputs.script }}"

      - name: Run script
        run: |
          RUN_AS="${{ inputs.run_as }}"
          SCRIPT="scripts/${{ inputs.script }}"
          if [ "$RUN_AS" = "default" ]; then
            echo "Running ${{ inputs.script }} as current runner user"
            bash "$SCRIPT"
          elif id "$RUN_AS" &>/dev/null; then
            echo "Running ${{ inputs.script }} as $RUN_AS"
            sudo -u "$RUN_AS" bash "$SCRIPT"
          else
            echo "WARN: User '$RUN_AS' not found on this runner — running as current user (demo mode)"
            bash "$SCRIPT"
          fi

      - name: Update audit/script-runner/audit_log_scripts.csv
        if: always()
        run: |
          MAX_ROWS=3
          AUDIT_FILE="audit/script-runner/audit_log_scripts.csv"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          NEW_ENTRY="$TIMESTAMP,${{ inputs.script }},${{ inputs.run_as }},${{ github.actor }},$STATUS"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            git fetch origin main
            git checkout origin/main -- "$AUDIT_FILE" 2>/dev/null || echo "timestamp,script,run_as,triggered_by,status" > "$AUDIT_FILE"

            echo "$NEW_ENTRY" >> "$AUDIT_FILE"

            TOTAL=$(wc -l < "$AUDIT_FILE")
            if [ "$TOTAL" -gt "$((MAX_ROWS + 1))" ]; then
              head -1 "$AUDIT_FILE" > "$AUDIT_FILE.tmp"
              tail -n "$MAX_ROWS" "$AUDIT_FILE" >> "$AUDIT_FILE.tmp"
              mv "$AUDIT_FILE.tmp" "$AUDIT_FILE"
            fi

            git add "$AUDIT_FILE"
            git commit -m "audit(script): ${{ inputs.script }} by ${{ github.actor }}"
            git push origin main && break
            echo "Push conflict, retrying ($i/3)..."
            git reset HEAD~1
          done
